body:
  text: 重刊道藏輯要太上老君內觀經老君曰天地媾精陰陽布化萬物以生承其宿業分靈道一父母和合人受其生始一月爲胞精血凝也二月成胎形兆胚也三月陽神爲三魂動而生也四月陰靈爲七魄靜鎭形也五月五行分藏以安神也六月六律定腑用滋靈也七月七精開竅通光明也八月八景神具降眞靈也九月宮室羅布以定精也十月炁足萬象成也元和哺食時不停也太一帝君在頭曰泥丸君總眾神也照生識神人之魂也司命處心納生元也无英居左制三魂也白元居右拘七魄也桃孩住臍深精根也照諸百節生百神也所以周身神不空也元炁入鼻灌泥丸也所以神明形固安也運動住止關其心也所以謂生有由然也予內觀之厯厯分也心者禁也一身之主心能禁制使形神不邪也心則神也變化不測故無定形所以五藏藏五神魂在肝魄在肺精在腎志在脾神在心所以字殊隨處名也心者火也南方太陽之精主火上爲熒惑下應心也色赤三葉如蓮花神明依泊從所名也其神也非青非黃非大非小非短非長非曲非直非柔非剛非厚非薄非圓非方變化莫測混合陰陽大包天地細入毫芒制之則正放之則狂清淨則生濁躁則亡明照八表暗迷一方但能虛寂生道自常永保無爲其身則昌也以其無形莫之能名禍福吉凶悉由之矣所以聖人立君臣明賞罰置官僚制法度正以教人人以難伏唯在於心心若清淨則萬禍不生所以流浪生死沉淪惡道皆由心也妄想憎愛取捨去來染著聚結漸自纒繞轉轉繫縳不能解脫便至滅亡由如牛馬引重趍泥轉增陷没不能自出遂至於死人亦如是始生之時神元清靜湛然無雜旣受納有形形染六情眼則貪色耳則殢聲口則耽味鼻則受馨意隨健羡身欲肥輕從此流浪莫能自悟聖人慈念設法教化使內觀己身澄其心也老君曰諦觀此身從虛無中來因緣運會積精聚炁乗華降神和合受生法天像地含陰吐陽分錯五行以應四時眼爲日月髮爲星辰眉爲華蓋頭爲崑崙布列宮闕安置精神萬物之中人最爲靈性命合道人當愛之內觀其身惟人尊焉而不自貴妄染諸塵不淨臭穢濁亂形神熟觀物我何踈何親守道長生爲善保眞世愚役役徒自苦辛也老君曰從道受分謂之命自一禀形謂之性所以任物謂之心心有所憶謂之意意之所出謂之志事無不知謂之智智周萬物謂之慧動而營身謂之魂靜而鎭形謂之魄流行骨肉謂之血保神養炁謂之精炁清而駛謂之榮炁濁而遲謂之衞總括百神謂之身萬象備見謂之形塊然有閡謂之質狀貌可則謂之體大小有分謂之軀眾思不測謂之神邈然應化謂之靈氣來入身謂之生神去於身謂之死所以通生謂之道道者有而無形無而有情變化不測通神羣生在人之身則爲神明所謂心也所以教人修道則修心也教人修心則修道也道不可見因生而明之生不可常用道以守之若生亡則道廢道廢則生亡生道合一則長生不死羽化神仙人不能長保者以其不能內觀於心故也內觀不遺生道長存老君曰人所以流浪惡道沉淪滓穢緣六情起妄而生六識六識分別繫縛憎愛去來取捨染著煩惱與道長隔所以內觀六識因起六欲識從何起識自慾起慾從何起慾自識起妄想顚倒而生有識亦曰自然又名無爲本來虛靜元無有識有識分別起諸邪見邪見旣興盡是煩惱展轉纏縛流浪生死永失於道矣老君曰道無生死而形有生死所以言生死者屬形不屬道也形所以生者由得其道也形所以死者由失其道也人能存生守道則長不亡也老君曰人能常清靜其心則道自來居道自來居則神明存身神明存身則生不亡也人常欲生而不能虛心人常惡死而不能保神亦由欲貴而不用道欲富而不求寶欲速而足不行欲肥而食不飽也老君曰道以心得心以道明心明則道降道降則心通神明之在身猶火之因巵也明從火起火自炷發炷因油潤油藉巵停四者若廢明何生焉亦如明緣神照神託心存心由形有形以道全一物不足明何依焉所以謂之神明者眼見耳聞意知心覺分別物理細微悉知由神以明故曰神明也老君曰虛心者遣其實也無心者除其有也定心者令不動也安心者使不危也靜心者令不亂也正心者使不邪也清心者使不濁也淨心者使不穢也此皆以有令使除也四見者心直者不反覆也心平者無高低也心明者無暗昧也心通者無窒礙也此皆本自照者也粗言數者餘可思也老君曰知道易信道難信道易行道難行道易得道難得道易守道難守而不失乃常存也老君曰道也者不可言傳口受而得之常虛心靜神道自來居愚者不知勞其形苦其心役其志躁其神而道愈遠而神愈悲背道求道當愼擇焉老君曰道貴長存保神固根精炁不散純白不分形神合道飛昇崑崙先天以生後天以存出入無間不由其門吹陰煦陽制魄拘魂億嵗眷屬千載子孫黃塵四起騎羊眞人金堂玉室送故迎新老君曰內觀之道靜神定心亂想不起邪妄不侵固身及物閉目思尋表裏虛寂神道微深外藏萬境內察一心了然明靜靜亂俱息念念相系深根甯極湛然常住杳冥難測憂患永消是非莫識老君曰吾非聖人學而得之故我求道無不受持千經萬術惟在心也太上老君內觀經
